server:
  # Render 등 클라우드는 PORT 환경 변수를 준다. 로컬은 기본 8080.
  port: ${PORT:8080}

app:
  cors:
    # 쉼표로 구분. 예: http://localhost:5173,https://your-app.vercel.app
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  kakao:
    # Render 환경변수: KAKAO_REST_API_KEY
    rest-api-key: ${KAKAO_REST_API_KEY:}

spring:
  datasource:
    url: jdbc:h2:mem:lunchpick;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console